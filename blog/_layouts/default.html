<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="author" content="{{ site.author }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">

  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%237c6aff'/><text y='.9em' font-size='70' x='15' fill='white' font-family='monospace' font-weight='bold'>&gt;_</text></svg>">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  {% seo %}
</head>
<body>
  <div class="site-wrapper">
    <!-- Header -->
    <header class="site-header">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        <div class="logo-mark">&gt;_</div>
        <span class="logo-text">{{ site.title }}<span>.</span></span>
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>홈</a>
        <a href="{{ '/tags' | relative_url }}" {% if page.url contains '/tags' %}class="active"{% endif %}>태그</a>
        <a href="{{ '/about' | relative_url }}" {% if page.url contains '/about' %}class="active"{% endif %}>소개</a>
        <a href="{{ '/feed.xml' | relative_url }}" title="RSS Feed" style="font-size: 18px; padding: 6px 8px;">⌁</a>
      </nav>
    </header>

    <!-- Content -->
    <main>
      {{ content }}
    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <p class="footer-text">
        © {{ 'now' | date: '%Y' }} <a href="{{ '/' | relative_url }}">{{ site.title }}</a> — Built with Jekyll &amp; GitHub Pages
      </p>
      <p class="footer-text">
        {% if site.github_username %}
          <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub</a>
        {% endif %}
      </p>
    </footer>
  </div>
</body>
</html>
